# docker-compose.override.yml
#
# This file is intentionally empty.
# Docker Compose auto-loads this file alongside docker-compose.yml, which would
# conflict with the explicit environment layers. Use the Makefile instead:
#
#   make dev    — build from source with hot-reload
#   make prod   — deploy from pre-built images
#
# Or invoke directly:
#   docker compose --env-file .env.dev  -f docker-compose.yml -f docker-compose.dev.yml  up
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
