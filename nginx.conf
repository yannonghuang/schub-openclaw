# nginx.conf
user  nginx;
worker_processes  auto;

events { worker_connections  1024; }

http {
  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    client_max_body_size 200M;
    #listen 443 ssl;
    listen 0.0.0.0:443 ssl;    
    ssl_certificate     /etc/nginx/certs/localhost+1.pem;
    ssl_certificate_key /etc/nginx/certs/localhost+1-key.pem;

    # allow your front-end origin to talk, with credentials
    # Replace with whatever host/port your Next.js front-end uses.
    
    set $NEXT_PUBLIC_FRONTEND_URL "https://192.168.86.175";
    #set $NEXT_PUBLIC_FRONTEND_URL "https://localhost";

    # Frontend
    location / {
      set $frontend_upstream http://frontend-service:3000;
      proxy_pass $frontend_upstream;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # Always send CORS headers for /auth
    location /auth/ {
        # If your FastAPI is _not_ mounted at /auth/, uncomment the rewrite:
        #rewrite ^/auth/(.*)$ /$1 break;
        # Short-circuit OPTIONS preflight
        
        # Always add these CORS headers
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        #add_header Access-Control-Allow-Credentials true       always;
        #add_header Access-Control-Allow-Methods     "GET,POST,OPTIONS" always;
        #add_header Access-Control-Allow-Headers     "Content-Type,Authorization" always;    

        #if ($request_method = OPTIONS) {
        #    return 204;
        #}

        proxy_pass        http://auth-service:4000/auth/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Rewrite the upstream Set-Cookie so that the browser sees Domain=localhost
        #proxy_cookie_domain  auth-service    localhost;
        #proxy_cookie_path    /                "/; Secure; HttpOnly; SameSite=None";
    }

    # Always send CORS headers for /auth
    location /business/ {
        # If your FastAPI is _not_ mounted at /auth/, uncomment the rewrite:
        #rewrite ^/auth/(.*)$ /$1 break;
        # Short-circuit OPTIONS preflight
        
        # Always add these CORS headers
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        #add_header Access-Control-Allow-Credentials true       always;
        #add_header Access-Control-Allow-Methods     "GET,POST,OPTIONS" always;
        #add_header Access-Control-Allow-Headers     "Content-Type,Authorization" always;    

        #if ($request_method = OPTIONS) {
        #    return 204;
        #}

        proxy_pass        http://auth-service:4000/business/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Rewrite the upstream Set-Cookie so that the browser sees Domain=localhost
        #proxy_cookie_domain  auth-service    localhost;
        #proxy_cookie_path    /                "/; Secure; HttpOnly; SameSite=None";
    }

    # Always send CORS headers for /auth
    location /material/ {
        # If your FastAPI is _not_ mounted at /auth/, uncomment the rewrite:
        #rewrite ^/auth/(.*)$ /$1 break;
        # Short-circuit OPTIONS preflight
        
        # Always add these CORS headers
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        #add_header Access-Control-Allow-Credentials true       always;
        #add_header Access-Control-Allow-Methods     "GET,POST,OPTIONS" always;
        #add_header Access-Control-Allow-Headers     "Content-Type,Authorization" always;    

        #if ($request_method = OPTIONS) {
        #    return 204;
        #}

        proxy_pass        http://auth-service:4000/material/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Rewrite the upstream Set-Cookie so that the browser sees Domain=localhost
        #proxy_cookie_domain  auth-service    localhost;
        #proxy_cookie_path    /                "/; Secure; HttpOnly; SameSite=None";
    }

    # Always send CORS headers for /auth
    location /location/ {
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        proxy_pass        http://auth-service:4000/location/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    # Always send CORS headers for /auth
    location /mcp/ {
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        proxy_pass        http://auth-service:4000/mcp/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    # Always send CORS headers for /auth
    location /tool/ {
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        proxy_pass        http://auth-service:4000/tool/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    # Always send CORS headers for /auth
    location /transportation/ {
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        proxy_pass        http://auth-service:4000/transportation/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    # Always send CORS headers for /auth
    location /subagent/ {
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        proxy_pass        http://auth-service:4000/subagent/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    # Always send CORS headers for /auth
    location /thread/ {
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        proxy_pass        http://auth-service:4000/thread/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    location /system/ {
        add_header Access-Control-Allow-Origin  $NEXT_PUBLIC_FRONTEND_URL always;
        proxy_pass        http://auth-service:4000/system/;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    # thread_ws
    location /thread_ws/ {
      proxy_pass http://auth-service:4000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }


    # openclaw HTTP API — token injected server-side, not exposed to browser
    location /v1/ {
      proxy_pass http://openclaw:18789/v1/;
      proxy_http_version 1.1;
      proxy_set_header Authorization "Bearer c34d9510b42222e8ff613d22f2d3dfc80b4eeb818aee7acc";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # SSE / streaming support
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
    }

    # switch service (WebSocket — kept for MessagePanel network pub/sub)
    location /switch/ {
      proxy_pass http://switch-service:6000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AG-UI SSE stream (replaces WebSocket for Agent trace/job/HITL events)
    location /agui/ {
      proxy_pass http://switch-service:6000/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # SSE: disable buffering so events reach the browser immediately
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
    }

    # audit service
    location /audit/ {
      proxy_pass http://audit-service:9000/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    
    # Proxy API paths
    #location /auth/       { proxy_pass http://auth-service:4000/auth/; }
    #location /transcript { proxy_pass http://transcript-service:4010/transcript; }
    #location /generate-advice { proxy_pass http://openai-service:4020/generate-advice; }
    # ...add other routes as needed...
  }
}
