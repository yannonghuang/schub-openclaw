
services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro      # your mkcert-generated certs
    ports:
      - "443:443"
    depends_on:
      frontend-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      openclaw:
        condition: service_started
      agent-chat-ui:
        condition: service_started

  db:
    image: pgvector/pgvector:pg17 #postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schub
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru  
    volumes:
      - redis-data:/data
      
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/schub
#      - NEXT_PUBLIC_FRONTEND_URL=https://192.168.0.101
    depends_on:
      - db
    ports:
      - "4000:4000"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw:/root/.openclaw
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MCP_API_KEY=${MCP_API_KEY:-}
    depends_on:
      - db
      - redis
      - mcp-server
      - auth-service

  geopol-service:
    build:
      context: .
      dockerfile: services/geopol/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - GEOPOL_INBOUND_CHANNEL=business:-1:channel
    depends_on:
      - redis
      - switch-service
    ports:
      - "8500:8500"

  audit-service:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/schub
    depends_on:
      - redis
      - db
    ports:
      - "9000:9000"

  frontend-service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - TRANSCRIPT_CHANNEL=transcript_channel
      - OPENAI_SERVICE_URL=http://openai-service:4020
      - SYSTEM_NODE=-1
      - EMAIL_NODE=-2
      #- NEXT_PUBLIC_FRONTEND_URL=https://localhost
      #- NEXT_PUBLIC_FRONTEND_URL=https://192.168.86.175
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  agent-chat-ui:
      image: localhost:5001/agent-chat-ui:latest
      build:
          context: ./agent-chat-ui
          dockerfile: dockerfile
          target: prod
      ports:
          - "3500:3500"
      #volumes:
      #    - agent-chat-ui-node-modules:/app/node_modules
      
  mcp-server:
      image: localhost:5001/mcp-server:latest
      build:
          context: ./mcp-server
          dockerfile: dockerfile
          target: dev
      ports:
          - "9500:9500"
      environment:
          # Leave MCP_API_KEY unset here for dev (no auth enforcement).
          # Set it in .env or as a real env var in prod to enable the key check.
          MCP_API_KEY: ${MCP_API_KEY:-}
      healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:9500/health"]
          interval: 5s
          timeout: 3s
          retries: 5
          start_period: 10s
  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: securepassword
    ports:
      - 10000:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin/
    depends_on:
      - db

volumes:
  db-data:
  redis-data:
  pgadmin-data:
