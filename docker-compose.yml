# docker-compose.yml — BASE (shared across all environments)
#
# Do NOT use alone. Always combine with an environment layer:
#   make dev    →  --env-file .env.dev  -f docker-compose.yml -f docker-compose.dev.yml
#   make prod   →  --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml
#
# This file defines service shapes (ports, depends_on, healthchecks, shared env vars).
# build:, image:, source mounts, and NODE_ENV are environment-specific and live in the layers above.

services:

  # ── Reverse proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
    ports:
      - "443:443"
    command: >
      sh -c "envsubst '$$FRONTEND_URL $$OPENCLAW_TOKEN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      frontend-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      openclaw:
        condition: service_started

  # ── Data stores ──────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: schub
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  # ── Application services ─────────────────────────────────────────────────────
  auth-service:
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/schub
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      - db
    ports:
      - "4000:4000"

  openclaw:
    ports:
      - "18789:18789"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - BACKEND_URL=http://auth-service:4000
      - OPENCLAW_URL=http://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - db
      - redis
      - mcp-server
      - auth-service

  adaptor:
    environment:
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - POLL_INTERVAL=${ADAPTOR_POLL_INTERVAL:-30}
      - BACKEND_URL=http://auth-service:4000
      - OPENCLAW_URL=http://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
      - SWITCH_URL=http://switch-service:6000/publish
      - SEEN_FILE=/data/adaptor_seen.json
    volumes:
      - adaptor-data:/data
    depends_on:
      - auth-service
      - openclaw
      - switch-service
    restart: unless-stopped

  switch-service:
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
    depends_on:
      - redis
      - openclaw
    ports:
      - "6000:6000"

  audit-service:
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/schub
      - PYTHONPATH=/app:/auth_service
    depends_on:
      - redis
      - db
    ports:
      - "9000:9000"

  frontend-service:
    environment:
      - REDIS_URL=redis://redis:6379
      - TRANSCRIPT_CHANNEL=transcript_channel
      - OPENAI_SERVICE_URL=http://openai-service:4020
      - SYSTEM_NODE=-1
      - EMAIL_NODE=-2
      - ALLOCATOR_BACKEND_URL=http://allocator-backend:8000
    depends_on:
      - auth-service
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mcp-server:
    ports:
      - "9500:9500"
    environment:
      MCP_API_KEY: ${MCP_API_KEY:-}
      ALLOCATOR_BACKEND_URL: http://allocator-backend:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9500/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Admin ────────────────────────────────────────────────────────────────────
  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "10000:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin/
    depends_on:
      - db

  # ── Allocator ────────────────────────────────────────────────────────────────
  db-init-allocator:
    image: pgvector/pgvector:pg17
    entrypoint: ["sh", "-c", "psql -h db -U postgres -c 'CREATE DATABASE allocator' || true"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  allocator-backend:
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/allocator
      CSV_ROOT_PATH: /data/csv
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db-init-allocator:
        condition: service_completed_successfully

  allocator-frontend:
    environment:
      API_BACKEND_URL: http://allocator-backend:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - allocator-backend

volumes:
  redis-data:
  adaptor-data:
