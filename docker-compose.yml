
services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro      # your mkcert-generated certs
    ports:
      - "443:443"
    depends_on:
      frontend-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      openclaw:
        condition: service_started

  db:
    image: pgvector/pgvector:pg17 #postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schub
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru  
    volumes:
      - redis-data:/data
      
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/schub
      - SMTP_HOST=${SMTP_HOST:-smtp.mail.me.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
#      - NEXT_PUBLIC_FRONTEND_URL=https://192.168.0.101
    depends_on:
      - db
    ports:
      - "4000:4000"

  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw:/home/node/.openclaw
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - IMAP_HOST=${IMAP_HOST:-imap.gmail.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - BACKEND_URL=http://auth-service:4000
      - OPENCLAW_URL=http://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - db
      - redis
      - mcp-server
      - auth-service

  adaptor:
    build:
      context: .
      dockerfile: services/adaptor/Dockerfile
    environment:
      - IMAP_HOST=${IMAP_HOST:-imap.mail.me.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - POLL_INTERVAL=${ADAPTOR_POLL_INTERVAL:-30}
      - BACKEND_URL=http://auth-service:4000
      - OPENCLAW_URL=http://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
      - SWITCH_URL=http://switch-service:6000/publish
      - SEEN_FILE=/data/adaptor_seen.json
    volumes:
      - adaptor-data:/data
    depends_on:
      - auth-service
      - openclaw
      - switch-service
    restart: unless-stopped

  switch-service:
    build:
      context: .
      dockerfile: services/switch/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
    depends_on:
      - redis
      - openclaw
    ports:
      - "6000:6000"

  #geopol-service:
  #  build:
  #    context: .
  #    dockerfile: services/geopol/Dockerfile
  #  environment:
  #    - REDIS_URL=redis://redis:6379
  #    - GEOPOL_INBOUND_CHANNEL=business:-1:channel
  #  depends_on:
  #    - redis
  #  ports:
  #    - "8500:8500"

  audit-service:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/schub
      - PYTHONPATH=/app:/auth_service
    volumes:
      - ./services/audit:/app
      - ./services/auth:/auth_service
    depends_on:
      - redis
      - db
    ports:
      - "9000:9000"

  frontend-service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - TRANSCRIPT_CHANNEL=transcript_channel
      - OPENAI_SERVICE_URL=http://openai-service:4020
      - SYSTEM_NODE=-1
      - EMAIL_NODE=-2
      - ALLOCATOR_BACKEND_URL=http://allocator-backend:8000
      #- NEXT_PUBLIC_FRONTEND_URL=https://localhost
      #- NEXT_PUBLIC_FRONTEND_URL=https://192.168.86.175
    # No host port needed — nginx proxies to this service internally
    depends_on:
      - auth-service
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
      
  mcp-server:
      image: localhost:5001/mcp-server:latest
      build:
          context: ./mcp-server
          dockerfile: dockerfile
          target: dev
      ports:
          - "9500:9500"
      environment:
          # Leave MCP_API_KEY unset here for dev (no auth enforcement).
          # Set it in .env or as a real env var in prod to enable the key check.
          MCP_API_KEY: ${MCP_API_KEY:-}
          ALLOCATOR_BACKEND_URL: http://allocator-backend:8000
      healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:9500/health"]
          interval: 5s
          timeout: 3s
          retries: 5
          start_period: 10s
  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: securepassword
    ports:
      - 10000:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin/
    depends_on:
      - db

  # ── Allocator ────────────────────────────────────────────────────────────────
  # One-shot service: creates the `allocator` DB on the shared PG instance if it
  # doesn't already exist.  Runs before allocator-backend on every `compose up`.
  db-init-allocator:
    image: pgvector/pgvector:pg17
    entrypoint: ["sh", "-c", "psql -h db -U postgres -c 'CREATE DATABASE allocator' || true"]
    environment:
      PGPASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  allocator-backend:
    build:
      context: ../allocator_inno_kotlin/backend-kotlin
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/allocator
      CSV_ROOT_PATH: /data/csv
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ../allocator_inno_kotlin/csv:/data/csv:ro
    depends_on:
      db-init-allocator:
        condition: service_completed_successfully

  # Allocator Next.js UI — accessible at http://localhost:3001
  # (port 3000 is taken by frontend-service)
  allocator-frontend:
    build:
      context: ../allocator_inno_kotlin/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      API_BACKEND_URL: http://allocator-backend:8000
      WATCHPACK_POLLING: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ../allocator_inno_kotlin/frontend:/app
      - allocator_frontend_node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      - allocator-backend

volumes:
  db-data:
    external: true
    name: schub_db-data
  redis-data:
  pgadmin-data:
    external: true
    name: schub_pgadmin-data
  adaptor-data:
  allocator_frontend_node_modules:
