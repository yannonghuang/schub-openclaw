# docker-compose.prod.yml — PROD layer
#
# Adds: pre-built image references, NODE_ENV=production, openclaw workspace init,
#       CSV data host-path mount, external named volumes.
# Usage: docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  # ── Init: populate openclaw workspace volume from image ─────────────────────
  # Refreshes agent instructions (AGENTS.md) and skills on every deploy.
  # Runtime state (credentials, sessions, memory) in the volume is preserved.
  openclaw-init:
    image: ${REGISTRY}schub-openclaw:${TAG}
    user: root
    volumes:
      - openclaw-workspace:/workspace
    entrypoint: >
      sh -c "
        cp -r /home/node/.openclaw-defaults/agents        /workspace/ &&
        cp -r /home/node/.openclaw-defaults/skills        /workspace/ &&
        cp -f /home/node/.openclaw-defaults/openclaw.json.template /workspace/ &&
        cp -r /home/node/.openclaw-defaults/canvas        /workspace/ &&
        cp -r /home/node/.openclaw-defaults/subagents     /workspace/ &&
        cp -r /home/node/.openclaw-defaults/telegram      /workspace/ &&
        chown -R 1000:1000 /workspace &&
        echo 'openclaw workspace ready'
      "
    restart: "no"

  auth-service:
    image: ${REGISTRY}schub-auth:${TAG}

  openclaw:
    image: ${REGISTRY}schub-openclaw:${TAG}
    volumes:
      - openclaw-workspace:/home/node/.openclaw
    depends_on:
      openclaw-init:
        condition: service_completed_successfully

  adaptor:
    image: ${REGISTRY}schub-adaptor:${TAG}

  switch-service:
    image: ${REGISTRY}schub-switch:${TAG}

  audit-service:
    image: ${REGISTRY}schub-audit:${TAG}

  frontend-service:
    image: ${REGISTRY}schub-frontend:${TAG}
    environment:
      - NODE_ENV=production

  mcp-server:
    image: ${REGISTRY}schub-mcp:${TAG}

  allocator-backend:
    image: ${REGISTRY}schub-allocator-backend:${TAG}
    volumes:
      - ${ALLOCATOR_CSV_PATH:-/opt/allocator-csv}:/data/csv:ro

  allocator-frontend:
    image: ${REGISTRY}schub-allocator-frontend:${TAG}
    environment:
      - NODE_ENV=production

volumes:
  # Stable named volumes; compose auto-creates if missing instead of failing
  # (e.g. after `docker volume rm` to reset pgadmin / postgres state).
  # Existing volumes with these names are still adopted by name.
  db-data:
    name: schub_db-data
  pgadmin-data:
    name: schub_pgadmin-data
  openclaw-workspace:
    name: schub_openclaw-workspace
